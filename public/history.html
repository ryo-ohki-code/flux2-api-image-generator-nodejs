<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Image History</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<style>
		:root {
			--bg-color: #1e1e2f;
			--card-bg: #2a2a40;
			--text-color: #ffffff;
			--accent-color: #6c63ff;
			--border-radius: 12px;
			--shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: 'Segoe UI', sans-serif;
			background-color: var(--bg-color);
			color: var(--text-color);
			padding: 2rem;
			line-height: 1.6;
		}

		h1 {
			text-align: center;
			margin-bottom: 1rem;
		}

		a.back-link {
			display: inline-block;
			margin-bottom: 1rem;
			color: var(--accent-color);
			text-decoration: none;
			font-weight: bold;
		}

		a.back-link:hover {
			text-decoration: underline;
		}

		.gallery {
			display: grid;
			gap: 1.5rem;
			grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
		}

		.gallery-card {
			background-color: var(--card-bg);
			border-radius: var(--border-radius);
			padding: 1rem;
			box-shadow: var(--shadow);
			text-align: center;
			transition: transform 0.2s ease-in-out;
		}

		.gallery-card:hover {
			transform: translateY(-5px);
		}

		.gallery-card img {
			width: 100%;
			border-radius: 10px;
			margin-bottom: 0.75rem;
			border: 1px solid #444;
		}

		p.timestamp {
			font-size: 0.875rem;
			color: #aaa;
		}

		a.config-link {
			display: inline-block;
			margin-top: 0.5rem;
			color: var(--accent-color);
			text-decoration: none;
			font-size: 0.9rem;
		}

		a.config-link:hover {
			text-decoration: underline;
		}

		.modal {
			display: none;
			position: fixed;
			z-index: 1000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.85);
			justify-content: center;
			align-items: center;
			flex-direction: column;
		}

		.modal-content {
			max-width: 90%;
			max-height: 90%;
			border-radius: 8px;
		}

		.modal-text {
			background: #2a2a40;
			padding: 1rem;
			border-radius: 8px;
			width: 90%;
			max-height: 70vh;
			overflow-y: auto;
			white-space: pre-wrap;
			font-family: monospace;
			margin-top: 1rem;
			display: none;
		}

		.close {
			position: absolute;
			top: 20px;
			right: 30px;
			color: white;
			font-size: 40px;
			font-weight: bold;
			cursor: pointer;
		}

		.close:hover,
		.close:focus {
			color: #aaa;
		}
	</style>
</head>

<body>
	<h1>🖼️ Image History</h1>
	<a href="/" class="back-link">← Back to Generator</a>
	<div class="gallery" id="imageGallery"></div>

	<!-- Modal Overlay -->
	<div id="modal" class="modal">
		<span class="close">&times;</span>
		<img class="modal-content" id="modalImage" />
		<div id="modalText" class="modal-text"></div>
	</div>


	<script>
		const modal = document.getElementById("modal");
		const modalImg = document.getElementById("modalImage");
		const modalText = document.getElementById("modalText");
		const closeBtn = document.querySelector(".modal .close");

		// Close modal
		closeBtn.onclick = () => modal.style.display = "none";
		modal.onclick = (e) => {
			if (e.target !== modalImg && e.target !== modalText) modal.style.display = "none";
		};

		async function loadImages() {
			const gallery = document.getElementById("imageGallery");
			const res = await fetch("/api/history");
			const images = await res.json();

			if (images.length === 0) {
				gallery.innerHTML = '<p style="text-align:center; width:100%">No images yet.</p>';
				return;
			}

			gallery.innerHTML = images.map(img => `
				<div class="gallery-card">
				<img src="${img.image}" loading="lazy" class="thumbnail" data-src="${img.image}" />
				<p class="timestamp">Date: ${new Date(img.timestamp).toLocaleString()}</p>
				${img.configExists
					? `<a href="#" class="config-link" data-timestamp="${img.timestamp}">📝 Config</a>`
					: ""
				}
				</div>
			`).join('');

			// Attach click listeners to images
			document.querySelectorAll(".thumbnail").forEach(img => {
				img.addEventListener("click", () => {
					modalText.style.display = "none";
					modalImg.style.display = "block";
					modalImg.src = img.dataset.src;
					modal.style.display = "flex";
				});
			});

			// Attach click listeners to config links
			document.querySelectorAll(".config-link").forEach(link => {
				link.addEventListener("click", async (e) => {
					e.preventDefault();
					const timestamp = link.dataset.timestamp;
					const configUrl = `/images/${timestamp}_config.txt`;
					try {
						const res = await fetch(configUrl);
						const text = await res.text();
						modalImg.style.display = "none";
						modalText.style.display = "block";
						modalText.textContent = text;
						modal.style.display = "flex";
					} catch (err) {
						alert("Failed to load config.");
					}
				});
			});
		}

		loadImages();
	</script>

</body>

</html>
